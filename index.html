<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Menu</title>
  <style>
    :root {
      --bg: #f6f1ea;
      --card: #fffaf4;
      --ink: #2c1f18;
      --muted: #6b564b;
      --accent: #7b4b2a;
      --line: rgba(44, 31, 24, 0.10);
      --shadow: 0 18px 45px rgba(75, 45, 26, 0.12);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f8f3ed 0%, #f1e8dc 100%);
      color: var(--ink);
    }

    .shell {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 20px;
    }

    .eyebrow {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(123, 75, 42, 0.08);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 4rem);
      line-height: 1;
    }

    .sub {
      margin-top: 12px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }

    .frame {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 100%;
      height: 78vh;
      border: 0;
      background: white;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 14px;
    }

    @media (max-width: 700px) {
      .shell { padding: 14px; }
      iframe { height: 72vh; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="eyebrow">Live Google Sheets Menu</div>
      <h1>Your Coffee Shop</h1>
      <div class="sub">
        Edit your Google Sheet and the published menu updates automatically.
      </div>
    </section>

    <section class="frame">
      <iframe
        src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSY4gWBxaMlsabshPp36natpLQfSt-LygQjGdsXgztok_J5w1dg3efZAyP2pqbYy-9ktNZi_1DW5PsF/pubhtml?gid=0&single=true&widget=false&headers=false"
        title="Live Menu">
      </iframe>
    </section>

    <div class="footer">
      Powered by your published Google Sheet
    </div>
  </div>
</body>
</html>
