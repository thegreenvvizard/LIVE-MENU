<script>
  const SHEET_ID = "1Yq0BbyasNmE2Gb5Wq102xKU9_j7gYRawWvGoXFGS_pA";
  const SHEET_NAME = "Menu";

  const statusEl = document.getElementById("status");
  const menuEl = document.getElementById("menu");

  function money(value) {
    if (value === null || value === undefined || value === "") return "";
    const cleaned = String(value).trim();
    const num = Number(cleaned.replace(/[^0-9.\-]/g, ""));
    if (!Number.isNaN(num) && cleaned !== "") return `$${num.toFixed(2)}`;
    return cleaned;
  }

  function buildUrl() {
    const query = encodeURIComponent("select A,B,C,D,E,F,G where B is not null order by A asc, F asc");
    return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(SHEET_NAME)}&tq=${query}`;
  }

  function parseGviz(text) {
    const start = text.indexOf("{");
    const end = text.lastIndexOf("}");
    return JSON.parse(text.substring(start, end + 1));
  }

  function cellValue(cell) {
    return cell && cell.v !== undefined ? cell.v : "";
  }

  function normalizeRows(gvizJson) {
    const rows = (gvizJson.table.rows || []).map(r => {
      const c = r.c || [];
      return {
        category: cellValue(c[0]) || "Menu",
        item: cellValue(c[1]),
        description: cellValue(c[2]),
        price: cellValue(c[3]),
        featured: String(cellValue(c[4]) || "").toLowerCase(),
        sort: Number(cellValue(c[5]) || 9999),
        tag: cellValue(c[6])
      };
    });
    return rows.filter(r => r.item);
  }

  function groupByCategory(rows) {
    const grouped = {};
    for (const row of rows) {
      if (!grouped[row.category]) grouped[row.category] = [];
      grouped[row.category].push(row);
    }
    return grouped;
  }

  function renderSidebar(featuredItems) {
    const wrap = document.createElement("div");
    wrap.className = "column";

    const featured = featuredItems[0];
    const featureCard = document.createElement("section");
    featureCard.className = "feature-card";
    featureCard.innerHTML = featured
      ? `
        <div class="feature-kicker">Featured Product</div>
        <h3 class="feature-title">${featured.item}</h3>
        <div class="feature-copy">${featured.description || "Add a description in your sheet to show extra promo text here."}</div>
        <div class="feature-price">${money(featured.price)}</div>
      `
      : `
        <div class="feature-kicker">Featured Product</div>
        <h3 class="feature-title">Spotlight Item</h3>
        <div class="feature-copy">Mark any row as Featured = Yes and it can show up here.</div>
        <div class="feature-price">$0.00</div>
      `;

    const infoCard = document.createElement("section");
    infoCard.className = "hours-card";
    infoCard.innerHTML = `
      <h3 class="hours-title">Sheet Setup</h3>
      <div class="hours-line"><span>Tab Name</span><span>Menu</span></div>
      <div class="hours-line"><span>Column Layout</span><span>A-G</span></div>
      <div class="hours-line"><span>Featured</span><span>Yes / No</span></div>
      <div class="hours-line"><span>Sort</span><span>Numbers</span></div>
    `;

    wrap.appendChild(featureCard);
    wrap.appendChild(infoCard);
    return wrap;
  }

  function render(rows) {
    const grouped = groupByCategory(rows);
    const categories = Object.keys(grouped);
    const featuredItems = rows.filter(item => item.featured === "yes" || item.featured === "true" || item.featured === "featured");
    menuEl.innerHTML = "";

    if (!categories.length) {
      statusEl.textContent = "No menu items found yet.";
      return;
    }

    statusEl.textContent = `Last loaded: ${new Date().toLocaleString()}`;

    const leftCol = document.createElement("div");
    leftCol.className = "column";

    const middleCol = document.createElement("div");
    middleCol.className = "column";

    categories.forEach((category, index) => {
      const card = document.createElement("section");
      card.className = "category";

      const head = document.createElement("div");
      head.className = "category-head";
      head.innerHTML = `
        <h2 class="category-title">${category}</h2>
        <div class="category-sub">Freshly synced from your Google Sheet</div>
      `;

      const itemsWrap = document.createElement("div");
      itemsWrap.className = "items";

      for (const item of grouped[category]) {
        const badges = [];
        if (item.featured === "yes" || item.featured === "true" || item.featured === "featured") {
          badges.push('<span class="badge">Featured</span>');
        }
        if (item.tag) {
          badges.push(`<span class="badge">${item.tag}</span>`);
        }

        const itemEl = document.createElement("div");
        itemEl.className = "item";
        itemEl.innerHTML = `
          <div class="item-top">
            <div class="item-name">${item.item}</div>
            <div class="price">${money(item.price)}</div>
          </div>
          ${item.description ? `<div class="desc">${item.description}</div>` : ""}
          ${badges.length ? `<div class="meta">${badges.join("")}</div>` : ""}
        `;
        itemsWrap.appendChild(itemEl);
      }

      card.appendChild(head);
      card.appendChild(itemsWrap);
      (index % 2 === 0 ? leftCol : middleCol).appendChild(card);
    });

    menuEl.appendChild(leftCol);
    menuEl.appendChild(middleCol);
    menuEl.appendChild(renderSidebar(featuredItems));
  }

  async function loadMenu() {
    try {
      const response = await fetch(buildUrl());
      const text = await response.text();
      const json = parseGviz(text);
      const rows = normalizeRows(json);
      render(rows);
    } catch (error) {
      console.error(error);
      statusEl.textContent = "Could not load menu. Check that the sheet is shared correctly and the tab name matches.";
    }
  }

  loadMenu();
  setInterval(loadMenu, 60000);
</script>
